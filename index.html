<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Podcast Design Canvas — New Episode</title>
    <link rel="stylesheet" href="app/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Podcast Design Canvas</span>
      </div>
      <span class="step-pill">Show library</span>
    </header>

    <main>
      <div class="intro" id="intro">
        <h1>Your podcast shows</h1>
        <p>
          Pick a show to see past episodes and start the next one with your saved template
          and visual identity. Each show keeps its own episodes and production status.
        </p>
      </div>

      <div id="app"><!-- setup wizard renders here --></div>
    </main>

    <script src="app/episode-setup.js"></script>
    <script src="app/episode-style.js"></script>
    <script src="app/audio-polish.js"></script>
    <script src="app/canvas-layers.js"></script>
    <script src="app/canvas-editor.js"></script>
    <script src="app/show-templates.js"></script>
    <script src="app/visual-moments.js"></script>
    <script src="app/social-context.js"></script>
    <script src="app/episode-export.js"></script>
    <script src="app/publish-review.js"></script>
    <script src="app/episode-workspace.js"></script>
    <script src="app/show-library.js"></script>
    <script src="app/episode-setup.ui.js"></script>
  </body>
</html>
